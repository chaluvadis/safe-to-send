name: Build & Publish VS Code Extension

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile TypeScript
        run: pnpm run compile

      - name: Read version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          PKG_VERSION="v$(node -p "require('./package.json').version")"

          echo "Tag: $TAG"
          echo "Package.json: $PKG_VERSION"

          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "❌ Tag must match package.json version"
            exit 1
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VSIX_NAME=safe-to-send-${TAG}.vsix" >> $GITHUB_ENV

      - name: Package extension
        run: |
          pnpm exec vsce package --no-dependencies --out "$VSIX_NAME"

      - name: Publish to Visual Studio Marketplace
        run: |
          pnpm exec vsce publish --packagePath "$VSIX_NAME" --pat "${{ secrets.VSCE_TOKEN }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: ${{ env.VSIX_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
